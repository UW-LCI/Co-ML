
number_separator:
  minimum_length: 5
  minimum_fraction_length: 5

opt_in_rules:
  - attributes

  - closure_end_indentation
  - closure_spacing

  - empty_count
  - explicit_init

  - final_test_case

  - first_where

  - nimble_operator
  - number_separator

  - overridden_super_call
  - operator_usage_whitespace
  - object_literal

  - prohibited_super_call

  - redundant_nil_coalescing

disabled_rules:
  - cyclomatic_complexity
  - fallthrough
  - force_cast
  - force_try
  - identifier_name
  - nesting
  - object_literal
  - operator_whitespace
  - todo
  - trailing_comma
  - trailing_newline
  - type_name
  - orphaned_doc_comment
  - trailing_whitespace
  - comment_spacing

  # Temporarily disabled, will re-enable in separate PRs
  - attributes
  - closure_end_indentation
  - function_parameter_count
  - large_tuple
  - multiple_closures_with_trailing_closure
  - unused_optional_binding
  - no_space_in_method_call
  - empty_enum_arguments
  - unused_closure_parameter

  # Ideally these rules would be enabled
  - file_length
  - function_body_length
  - line_length
  - type_body_length

custom_rules:
  use_verbatim_in_preview_providers:
    regex: '(PreviewProvider|#Preview)[\s\S]+Text\(\"'
    message: "Preview providers should use the 'verbatim' parameter for text elements, or else non-user-facing strings will be sent to the translation team. If the Text element in question is not in a preview provider, please move all preview providers to the _end_ of their respective file."
